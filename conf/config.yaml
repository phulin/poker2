defaults:
  - config_transformer
  - _self_

# AlphaHoldem Default Configuration
# Balanced configuration for general training

# === TRAINING CONFIGURATION ===
opponent_pool_type: "k_best"
checkpoint_dir: "checkpoints"

# === DEVICE/ENV OVERRIDES ===

# === WANDB CONFIGURATION ===
use_wandb: false
wandb_project: "poker-kbest"
wandb_tags: ["kbest", "poker", "ppo"]

# Additional overrides
economize_checkpoints: false

# === EXPLOITER CONFIGURATION ===
exploiter:
  batch_size: 512

# === TRAINING HYPERPARAMETERS ===
train:
  batch_size: 1024
  episodes_per_step: 4
  max_trajectory_length: 20
  max_sequence_length: 50
  value_loss_type: "huber"
  use_mixed_precision: false

# === MODEL CONFIGURATION ===
model:
  name: "siamese_convnet_v1"
  kwargs:
    cards_hidden: 192
    actions_hidden: 192
    fusion_hidden: [1024, 1024]
    num_actions: 8
  
# === ENVIRONMENT CONFIGURATION ===
# keep base env; no overrides here
env: {}
