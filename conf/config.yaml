defaults:
  - config_transformer
  - _self_

# Default Configuration
# CNN-specific overrides over transformer defaults

# === TRAINING CONFIGURATION ===
opponent_pool_type: "k_best"
checkpoint_dir: "checkpoints"

# === DEVICE/ENV OVERRIDES ===

# === WANDB CONFIGURATION ===
use_wandb: false
wandb_project: "poker-kbest"
wandb_tags: ["kbest", "poker", "ppo"]

# Additional overrides
economize_checkpoints: false

# === EXPLOITER CONFIGURATION ===
exploiter:
  batch_size: 512

# === TRAINING HYPERPARAMETERS ===
train:
  batch_size: 1024
  episodes_per_step: 4
  max_trajectory_length: 20
  value_loss_type: "huber"
  use_mixed_precision: false
  target_kl: 0.015  # Target KL divergence for adaptive controllers

# === MODEL CONFIGURATION ===
model:
  name: "siamese_convnet_v1"
  value_head_type: "scalar"
  value_head_num_quantiles: 1
  cards_channels: 6
  actions_channels: 24
  cards_hidden: 192
  actions_hidden: 192
  fusion_hidden: [1024, 1024]
  num_actions: 8
  use_gradient_checkpointing: true

# === ENVIRONMENT CONFIGURATION ===
# keep base env; no overrides here
env: {}
