# ReBeL-style CFR training configuration using the feed-forward model.

defaults:
  - _self_

num_steps: 10000
use_tensor_env: true
num_envs: 256
device: cuda
checkpoint_dir: "checkpoints-rebel"
checkpoint_interval: 50
economize_checkpoints: true
use_wandb: true
wandb_project: "poker-rebel-cfr"
wandb_tags: ["rebel", "cfr"]

train:
  learning_rate: 3e-4
  batch_size: 1024
  replay_buffer_batches: 8
  value_coef: 1.0
  entropy_coef: 0.0
  grad_clip: 1.0

model:
  name: "rebel_ffn"
  input_dim: 2661
  hidden_dim: 1536
  num_hidden_layers: 6
  detach_value_head: false

env:
  stack: 1000
  sb: 5
  bb: 10
  bet_bins: [0.5, 1.0]

search:
  enabled: true
  depth: 3
  iterations: 150
  warm_start_iterations: 15
  belief_samples: 16
  dcfr_alpha: 1.5
  dcfr_beta: 0.0
  dcfr_gamma: 2.0
  dcfr_delay: 50
  include_average_policy: true
  cfr_type: discounted
  cfr_avg: true
