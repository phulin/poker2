# ReBeL-style CFR training configuration using the feed-forward model.

defaults:
  - _self_

num_steps: 10000
use_tensor_env: true
num_envs: 256
device: cuda
checkpoint_dir: checkpoints-rebel
checkpoint_interval: 50
economize_checkpoints: true
use_wandb: true
wandb_project: poker-rebel-cfr
wandb_tags: ["rebel", "cfr"]

train:
  learning_rate: 3e-4
  batch_size: 1024
  replay_buffer_batches: 16
  value_reuse_goal: 8
  value_coef: 2.0
  entropy_coef: 0.0
  grad_clip: 1.0

  stratify_streets_until:
    - threshold: 2000
      probabilities: [0.03, 0.03, 0.09, 0.85]
    - threshold: 4000
      probabilities: [0.05, 0.05, 0.15, 0.75]
    - threshold: 6000
      probabilities: [0.15, 0.15, 0.30, 0.40]
    - threshold: 10000
      probabilities: [0.25, 0.25, 0.25, 0.25]

model:
  name: BetterFFN
  hidden_dim: 1024
  range_hidden_dim: 128
  ffn_dim: 1024
  num_hidden_layers: 6
  detach_value_head: false
  compile: true

env:
  stack: 1000
  sb: 5
  bb: 10
  bet_bins: [0.5, 1.0]

search:
  enabled: true
  depth: 3

  cfr_type: discounted
  cfr_avg: true

  iterations: 150
  warm_start_iterations: 15
  dcfr_delay: 40

  dcfr_alpha: 1.5
  dcfr_beta: 0.0
  dcfr_gamma: 2.0
