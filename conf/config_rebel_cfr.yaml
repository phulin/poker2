# ReBeL-style CFR training configuration using the feed-forward model.

defaults:
  - _self_

num_steps: 7000
use_tensor_env: true
num_envs: 192
device: cuda
checkpoint_dir: checkpoints-rebel
checkpoint_interval: 50
economize_checkpoints: true
use_wandb: true
wandb_project: poker-rebel-cfr
wandb_tags: ["rebel", "cfr"]

train:
  learning_rate: 1e-3
  learning_rate_final: 1e-4
  lr_schedule: cosine

  weight_decay: 0.01
  batch_size: 1024
  episodes_per_step: 50
  replay_buffer_batches: 256
  value_reuse_goal: 4
  policy_capacity_factor: 10
  value_coef: 1.0
  entropy_coef: 0.0
  permutation_coef: 0.1
  grad_clip: 1.0

  stratify_streets: []
    # - threshold: 500
    #   probabilities: [0.03, 0.03, 0.09, 0.85]
    # - threshold: 1500
    #   probabilities: [0.05, 0.05, 0.15, 0.75]
    # - threshold: 2500
    #   probabilities: [0.15, 0.15, 0.30, 0.40]
    # - threshold: 3500
    #   probabilities: [0.25, 0.25, 0.25, 0.25]

model:
  name: BetterFFN
  hidden_dim: 1024
  range_hidden_dim: 256
  ffn_dim: 1024

  shared_trunk: false
  num_hidden_layers: 3
  num_value_layers: 3
  num_policy_layers: 4
  
  detach_value_head: false
  compile: true
  enforce_zero_sum: true

env:
  stack: 1000
  sb: 5
  bb: 10
  bet_bins: [0.5, 1.0]

search:
  enabled: true
  depth: 5
  sparse: true
  value_targets_from_final_policy: true

  cfr_type: discounted_plus
  cfr_avg: true

  iterations: 150
  iterations_final: 500
  warm_start_iterations: 15
  dcfr_plus_delay: 40

  dcfr_alpha: 1.5
  dcfr_beta: 0.0
  dcfr_gamma: 2.0
