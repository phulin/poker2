defaults:
  - config_transformer
  - _self_

# High-Performance Configuration
# Optimized for vast.ai GPUs (RTX 4090/4080)

# === TRAINING CONFIGURATION ===
num_steps: 25000
opponent_pool_type: "dred"  # "k_best" or "dred"
k_best_pool_size: 10
min_elo_diff: 75.0
min_step_diff: 300  # Minimum step difference before considering for pool updates
checkpoint_interval: 100
eval_interval: 500
checkpoint_dir: checkpoints-high-perf

# === DEVICE/ENV OVERRIDES ===
device: cuda
num_envs: 7000 # make this around 60% batch size

# === WANDB CONFIGURATION ===
use_wandb: true
wandb_project: poker-cnn-hp

economize_checkpoints: true

# === EXPLOITER CONFIGURATION ===
exploiter:
  enabled: true
  training_interval: 1000  # Train every 1000 steps
  training_steps: 50       # Number of steps to train exploiter
  learning_rate: 3e-4      # Higher LR for faster adaptation
  batch_size: 2048         # Smaller batch for high-perf exploiter
  episodes_per_step: 2            # Fewer epochs per update
  entropy_coef: 0.005      # Lower entropy for more focused exploitation

# === TRAINING HYPERPARAMETERS ===
train:
  batch_size: 12000
  replay_buffer_batches: 4
  max_trajectory_length: 15
  use_mixed_precision: true

# === MODEL CONFIGURATION ===
model:
  name: "siamese_convnet_v1"
  cards_channels: 6
  actions_channels: 24
  cards_hidden: 192
  actions_hidden: 192
  fusion_hidden: [2048, 2048]
  num_actions: 8

# === ENVIRONMENT CONFIGURATION ===
# keep base env; no overrides here
env: {}
