# AlphaHoldem High-Performance Configuration
# Optimized for vast.ai GPUs (RTX 4090/4080)

# === TRAINING CONFIGURATION ===
num_steps: 25000
k_best_pool_size: 10
min_elo_diff: 75.0
k_factor: 4.0  # Higher K-factor for more aggressive ELO updates
checkpoint_interval: 100
eval_interval: 500
checkpoint_dir: checkpoints-high-perf

# === DEVICE CONFIGURATION ===
device: cuda

# === ENVIRONMENT CONFIGURATION ===
use_tensor_env: true
num_envs: 5000 # make this around 60% batch size

# === WANDB CONFIGURATION ===
use_wandb: true
wandb_project: poker-kbest-vast
wandb_name: null  # Auto-generated if null
wandb_tags: ["kbest", "poker", "ppo", "high-perf", "vast-ai"]
wandb_run_id: null  # Wandb run ID to resume

# === RESUME CONFIGURATION ===
resume_from: null

# === RANDOM SEED ===
seed: 42

# === ADDITIONAL CONFIGURATION ===
config: null  # Path to YAML config for components/hparams
economize_checkpoints: true  # Enable checkpoint economization for vast.ai storage efficiency

# === TRAINING HYPERPARAMETERS ===
train:
  learning_rate: 3e-4
  batch_size: 8192
  num_epochs: 5
  replay_buffer_batches: 10
  
  # PPO hyperparameters
  ppo_eps: 0.2
  ppo_delta1: 3.0
  gae_lambda: 0.95
  gamma: 0.999
  entropy_coef: 0.01
  value_coef: 0.05
  grad_clip: 1.0
  
  # Value loss configuration
  value_loss_type: "huber"
  huber_delta: 1.0
  
  # Mixed precision configuration
  use_mixed_precision: true  # Enable automatic mixed precision for speed/memory
  loss_scale: 128.0  # Initial loss scale for mixed precision

# === MODEL CONFIGURATION ===
model:
  name: "siamese_convnet_v1"
  kwargs:
    cards_channels: 6
    actions_channels: 24
    fusion_hidden: [2048, 2048]
    num_actions: 8
  
  # Policy configuration
  policy:
    name: "categorical_v1"
    kwargs: {}

# === ENVIRONMENT CONFIGURATION ===
env:
  # Game configuration
  stack: 1000
  sb: 5
  bb: 10
  
  # Betting configuration
  bet_bins: [0.5, 0.75, 1.0, 1.5, 2.0]
  
  # Card encoder configuration
  card_encoder:
    name: "cards_planes_v1"
    kwargs: {}
  
  # Action encoder configuration
  action_encoder:
    name: "actions_hu_v1"
    kwargs:
      history_actions_per_round: 6