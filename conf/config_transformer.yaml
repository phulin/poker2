# AlphaHoldem Transformer Configuration
# Configuration for transformer-based poker model

# === TRAINING CONFIGURATION ===
num_steps: 2000
opponent_pool_type: "dred"  # "k_best" or "dred"
k_best_pool_size: 10
min_elo_diff: 50.0
min_step_diff: 300
k_factor: 1.0
checkpoint_interval: 50
eval_interval: 100
checkpoint_dir: "checkpoints-transformer"

# === DEVICE CONFIGURATION ===
device: mps

# === ENVIRONMENT CONFIGURATION ===
use_tensor_env: true
num_envs: 512
offload_opponent_models: true  # Move opponent models to CPU after inference to save GPU memory

# === WANDB CONFIGURATION ===
use_wandb: true
wandb_project: "poker-transformer"
wandb_name: null
wandb_tags: ["transformer", "poker", "ppo"]
wandb_run_id: null

# === RESUME CONFIGURATION ===
resume_from: null

# === RANDOM SEED ===
seed: 42

# === ADDITIONAL CONFIGURATION ===
config: null
economize_checkpoints: false
strict_model_loading: false  # Use strict model loading (default: False)

# === EXPLOITER CONFIGURATION ===
exploiter:
  enabled: true
  training_interval: 1000  # Train every 1000 steps
  training_steps: 50       # Number of steps to train exploiter
  learning_rate: 3e-4      # Higher LR for faster adaptation
  batch_size: 256          # Smaller batch for transformer exploiter
  episodes_per_step: 2            # Fewer epochs per update
  entropy_coef: 0.005      # Lower entropy for more focused exploitation

# === TRAINING HYPERPARAMETERS ===
train:
  learning_rate: 3e-4  # Lower LR for transformer
  learning_rate_final: 1e-5
  lr_schedule: cosine
  batch_size: 512      # Smaller batch size for transformer
  episodes_per_step: 2
  replay_buffer_batches: 4
  max_trajectory_length: 9
  max_sequence_length: 47
  use_kv_cache: false
  
  # PPO hyperparameters
  ppo_eps: 0.2
  ppo_delta1: 3.0
  ppo_clipping: "dual"  # Clipping mode: "none", "single", or "dual"
  ppo_dual_clip: 3.0    # Dual clip parameter for negative advantages
  kl_type: "reverse"    # KL divergence type: "forward" or "reverse"
  gae_lambda: 0.95
  gamma: 0.999
  entropy_coef: 0.01
  entropy_coef_final: 0.002
  entropy_decay_portion: 0.6
  value_coef: 0.5
  grad_clip: 1.0
  
  # Value loss configuration
  value_loss_type: "quantile"
  huber_delta: 0.5
  quantile_huber_kappa: 1.0
  return_clipping: false  # Enable return clipping in value loss
  
  # Mixed precision configuration
  use_mixed_precision: true
  loss_scale: 128.0

  # KL beta controller
  beta_min: 1.0e-4
  beta_max: 10.0
  beta_increase_factor: 2.0
  beta_decrease_factor: 0.5
  
  # Transformer-specific training parameters
  auxiliary_loss_coef: 0.1  # Coefficient for hand range auxiliary loss
  warmup_steps: 1000       # Learning rate warmup steps
  weight_decay: 0.01       # Weight decay for regularization

# === MODEL CONFIGURATION ===
model:
  name: "poker_transformer_v1"
  value_head_type: "quantile"
  value_head_num_quantiles: 51
  max_sequence_length: 47
  d_model: 128  # Reduced for better performance
  n_layers: 2   # Reduced for better performance
  n_heads: 2    # Reduced for better performance
  dropout: 0.0
  num_bet_bins: 8
  use_gradient_checkpointing: false  # Disabled for performance
  
# === ENVIRONMENT CONFIGURATION ===
env:
  # Game configuration
  stack: 1000
  sb: 5
  bb: 10
  
  # Betting configuration
  bet_bins: [0.5, 0.75, 1.0, 1.5, 2.0]
  
  # Game flow configuration
  flop_showdown: false  # Skip turn/river, go directly to showdown after flop
  
  # Debug configuration
  debug_step_table: false
