# Pluggable component selection
card_encoder:
  name: cards_planes_v1
  kwargs: {}
action_encoder:
  name: actions_hu_v1
  kwargs:
    history_actions_per_round: 6
model:
  name: siamese_convnet_v1
  kwargs:
    cards_channels: 6
    actions_channels: 24
    fusion_hidden: [1024, 1024]
    num_actions: 8
policy:
  name: categorical_v1
  kwargs: {}

# Chips
stack: 1000
sb: 5
bb: 10

# Betting bin multipliers over total_committed
bet_bins: [0.5, 0.75, 1.0, 1.5, 2.0]

# Training hyperparameters (Trinal-Clip PPO)
ppo_eps: 0.2
ppo_delta1: 3.0
gae_lambda: 0.95
gamma: 0.999
entropy_coef: 0.01
value_coef: 0.05
grad_clip: 1.0
seed: 0

# Training scale knobs
learning_rate: 1e-4
# Batches of 4096, replay buffer 4 * 4096 = 16384, sample 4 batches (=1 epoch) per iteration
batch_size: 1024
episodes_per_step: 4
replay_buffer_batches: 4
value_loss_type: huber
huber_delta: 1.0
