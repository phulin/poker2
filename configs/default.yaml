# Pluggable component selection
card_encoder:
  name: cards_planes_v1
  kwargs: {}
action_encoder:
  name: actions_hu_v1
  kwargs:
    history_actions_per_round: 6
model:
  name: siamese_convnet_v1
  kwargs:
    cards_channels: 6
    actions_channels: 24
    fusion_hidden: [2048, 2048]
    num_actions: 8
policy:
  name: categorical_v1
  kwargs: {}

# Chips
stack: 1000
sb: 5
bb: 10

# Betting bin multipliers over total_committed
bet_bins: [0.5, 0.75, 1.0, 1.5, 2.0]

# Training hyperparameters (Trinal-Clip PPO)
ppo_eps: 0.2
ppo_delta1: 3.0
gae_lambda: 0.95
gamma: 0.999
entropy_coef: 0.05
value_coef: 1e-8
grad_clip: 1.0
seed: 0

# Training scale knobs
learning_rate: 3e-4
batch_size: 1024
mini_batch_size: 1024
num_epochs: 1
replay_buffer_batches: 16
